<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a3d2b">
<title>PTGMF · Dubtes Freqüents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --v-fosc:  #1a3d2b;
  --v-fosc2: #163424;
  --v:       #2d6a4f;
  --v-mig:   #40916c;
  --v-clar:  #74c69d;
  --v-pale:  #d8f3dc;
  --fons:    #f0f4f1;
  --card:    #ffffff;
  --text:    #1c2b22;
  --suau:    #5a7060;
  --borde:   #dce8df;
  --sh:      0 4px 24px rgba(45,106,79,.13);
  --ff-s:    'DM Sans', 'Helvetica Neue', Arial, sans-serif;
  --safe-t:  env(safe-area-inset-top, 0px);
  --safe-b:  env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--ff-s);
  background: var(--fons);
  color: var(--text);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
.header {
  background: var(--v-fosc); padding: calc(var(--safe-t) + 14px) 18px 14px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: 0 2px 10px rgba(0,0,0,.25); position: relative; z-index: 50;
}
.back-btn {
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.13);
  color: #fff; border-radius: 8px; font-size: 14px; font-weight: 600;
  padding: 7px 12px; cursor: pointer; text-decoration: none; transition: background .2s;
}
.back-btn:hover { background: rgba(255,255,255,.16); }
.header-title { color: #fff; font-weight: 700; font-size: 16px; flex: 1; }
.lang-btn {
  background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.22);
  color: rgba(255,255,255,.9); border-radius: 8px; font-size: 11px; font-weight: 700;
  padding: 6px 10px; cursor: pointer; letter-spacing: .6px; transition: background .2s;
}
.lang-btn:active { background: rgba(255,255,255,.26); }

/* ── CHAT CONTAINER ── */
.chat-container {
  flex: 1; display: flex; flex-direction: column; background: var(--fons);
  max-width: 600px; width: 100%; margin: 0 auto; position: relative;
  height: calc(100vh - 60px);
}
.chat-messages {
  flex: 1; padding: 20px 16px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 14px;
}
.msg { max-width: 85%; animation: fadeIn .3s ease-out forwards; display: flex; flex-direction: column; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; }

.msg-bubble {
  padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.45; box-shadow: 0 1px 3px rgba(0,0,0,.05);
}
.msg.bot .msg-bubble { background: var(--card); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--borde); }
.msg.user .msg-bubble { background: var(--v-mig); color: #fff; border-bottom-right-radius: 4px; font-weight: 500; }

.msg-meta { font-size: 10px; color: var(--suau); margin-top: 4px; padding: 0 4px; }
.msg.user .msg-meta { align-self: flex-end; }

/* ── INTERACTIVE OPTIONS PANELS ── */
.chat-options-panel {
  padding: 14px 16px calc(var(--safe-b) + 16px); background: linear-gradient(180deg, rgba(240,244,241,0) 0%, rgba(240,244,241,1) 20%);
  display: flex; flex-direction: column; gap: 8px; border-top: 1px solid rgba(45,106,79,.06);
}
.opt-btn {
  width: 100%; text-align: left; background: var(--card); border: 1px solid var(--v-clar);
  color: var(--v-fosc); padding: 12px 16px; border-radius: 12px; font-size: 13.5px;
  font-weight: 600; cursor: pointer; transition: background .2s, transform .1s, border-color .2s;
  box-shadow: 0 2px 6px rgba(45,106,79,.05); display: flex; align-items: center; justify-content: space-between;
}
.opt-btn:hover { background: var(--v-pale); border-color: var(--v-mig); }
.opt-btn:active { transform: scale(.99); }
.opt-btn::after { content: '→'; font-weight: 700; color: var(--v-mig); font-size: 14px; margin-left: 8px; }

/* Typing animation */
.typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
.typing-dots span { width: 6px; height: 6px; background: var(--suau); border-radius: 50%; animation: blink 1.4s infinite both; }
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }
</style>
</head>
<body>

<header class="header">
  <a href="index.html" class="back-btn" data-i18n="btnBack">← Hub</a>
  <h1 class="header-title" data-i18n="pageTitle">Dubtes Freqüents</h1>
  <button class="lang-btn" id="lang-btn" onclick="cycleLang()">CA</button>
</header>

<div class="chat-container">
  <div class="chat-messages" id="chat-box"></div>
  <div class="chat-options-panel" id="options-box"></div>
</div>

<script>
const LANGS       = ['ca', 'es', 'en'];
const LANG_LABELS = { ca: 'CA', es: 'ES', en: 'EN' };

/* ========================================================================
  📖 GUIA TUTORIAL: COM AFEGIR MÉS PREGUNTES I RESPOSTES AL FORESTBOT
  ========================================================================
  Per afegir una nova pregunta, has de fer canvis als 2 llocs següents:

  PAS 1: Afegir el text de la pregunta i la resposta a "BOT_DATA"
  A sota veuràs tres blocs: 'ca' (Català), 'es' (Castellà) i 'en' (Anglès).
  Dins de CADA idioma, has de crear dos camps nous seguint la numeració.
  Per exemple, per crear la pregunta 6:
    opt6: 'La teva pregunta aquí',
    res6: 'La teva resposta aquí'
  ⚠️ ATENCIÓ: Posa una coma (,) al final de cada línia excepte en l'última de l'objecte.
  ⚠️ TEXT MULTILÍNIA: Si vols fer un salt de línia a la resposta, posa '\n'.
  ⚠️ NEGRETA: Si vols posar text en negreta, posa-lo entre dos asteriscs: **text**.

  PAS 2: Afegir el botó a la llista d'opcions del menú (Funció "showMainMenu")
  Busca més avall la funció anomenada "showMainMenu()". Allà veuràs els botons.
  Només has d'afegir una línia més copiant l'estructura canviant el número.
  Exemple per a la pregunta 6:
    <button class="opt-btn" onclick="handleSelectOption(6)">\${t.opt6}</button>

  Això és tot! El codi s'encarrega automàticament de tota la resta.
  ========================================================================
*/

const BOT_DATA = {
  ca: {
    btnBack: '← Hub',

    // Botons del menú principal
    opt1: '🌲 Com funciona l\'app d\'inventari?',

    // Respostes corresponents
    res1: 'La primera aplicació integrada a la llançadora és l\'**Inventari Forestal Mòbil**. Et permet recollir gran quantitat de dades directament en el bosc estructurades per **finca, parcel·la i rodal**, ameres de registrar detalls de la vegetació i mesures d\'arbres. Un cop acabat, pots exportar les dades en un **fitxer CSV** i utilitzar un programa analitzador especialitzat per processar tota la informació.',

    res4: 'Al menú inferior o lateral del teu Hub, disposes d\'un botó flotant amb la icona de la bombeta (**Proposar millora / Incidències**). Des d\'allà pots omplir un formulari classificant el cas com un error (bug), una nova idea o un problema de disseny. Ens arribarà directament un avís per resoldre-ho!',
    res5: 'Aquest programari ha estat completament desenvolupat i creat per (**Martí Solé i Xanxo**) amb la ajuda de la IA.\n\nEl projecte es distribueix sota una **llicència MIT modificada**. Aquesta variant manté la permissivitat de la MIT original (permet l\'ús, còpia, modificació i distribució del codi), però introdueix una **clàusula addicional reguladora de l\'ús comercial**:\n\nQualsevol explotació o ús comercial del programari requereix el **consentiment explícit de l\'autor** i pot comportar una **compensació econòmica**. Aquesta mesura busca protegir la propietat intel·lectual i assegurar que l\'ús amb finalitats comercials es realitzi sota un acord formal i amb el mutu reconeixement dels autors.'
  },
  es: {
    btnBack: '← Hub',
    pageTitle: 'Dudas Frecuentes',
    botName: 'ForestBot',
    welcome: '👋 ¡Hola! Soy **ForestBot**, tu asistente virtual de la lanzadera de aplicaciones forestales. Estoy aquí para ayudarte a digitalizar y agilizar tu trabajo de campo. ¿Qué duda tienes?',
    menuTitle: 'Elige una opción para responder:',
    
    opt1: '🌲 ¿Cómo funciona la app de inventario?',
    opt2: '📡 ¿Funciona sin conexión a internet?',
    opt3: '💾 Diferencia Invitado vs. Registrado',
    opt4: '✉️ ¿Cómo reportar incidencias o ideas?',
    opt5: '⚖️ Propiedad intelectual y Derechos de autor',
    optMenu: '🔄 Ver otras dudas (Menú)',

    res1: 'La primera aplicación integrada en la lanzadera es el **Inventario Forestal Móvil**. Te permite recopilar gran cantidad de datos directamente en el bosque estructurados por **finca, parcela y rodal**, además de registrar detalles de la vegetación y medidas de árboles. Al terminar, puedes exportar los datos en un **archivo CSV** y usar un programa analizador especializado para procesar toda la información.',
    res2: '¡Sí, está totalmente pensada para el campo! La aplicación **funciona 100% offline (sin internet)**. Puedes recopilar todos los datos del inventario en zonas recóndites del bosque. En cuanto tu móvil vuelva a detectar conexión a internet, los datos se **sincronizarán automáticamente** con el servidor.',
    res3: 'La diferencia principal es la seguridad de tus datos:\n\n• **Mode Invitado:** Es un acceso libre y todo se guarda **en local** en el navegador del móvil. Si pierdes o rompes el teléfono, o si borras la caché, los datos se perderán.\n\n• **Usuario Registrado:** El registro es **libre para todos**. Al iniciar sesión, los datos se guardan en la base de datos online (nube). Esto sirve de copia de seguridad y te permite abrir tus datos desde cualquier otro dispositivo.',
    res4: 'En el menú de tu Hub dispones de un botón flotante con el icono de la bombilla (**Proponer mejora / Incidencias**). Desde allí puedes rellenar un formulario clasificando el caso como error (bug), nueva idea o problema de diseño. ¡Nos llegará directamente un aviso para solucionarlo!',
    res5: 'Este software ha sido completamente desarrollado y creado por (**Martí Solé i Xanxo**) con la ayuda de la IA.\n\nEl proyecto se distribuye bajo una **licencia MIT modificada**. Esta variante mantiene la permisividad de la MIT original (permite el uso, copia, modificación y distribución), pero introduce una **cláusula adicional que regula el uso comercial**:\n\nCualquier explotación comercial del software requiere el **consentimiento explícito del autor** y puede conllevar una **compensación económica**. Esta medida busca proteger la propiedad intelectual y asegurar que el uso comercial se realice bajo un acuerdo formal y con el reconocimiento de los autores.'

  en: {
    btnBack: '← Hub',
    pageTitle: 'FAQ',

    welcome: '👋 Hello! I am **ForestBot**, your virtual assistant for the forestry applications launcher. I am here to help you digitalize and streamline your field work. How can I help you?',
    menuTitle: 'Choose an option below:',
    
    opt1: '🌲 How does the inventory app work?',
    opt2: '📡 Does it work without internet?',
    opt3: '💾 Difference Guest vs. Registered',
    opt4: '✉️ How to report issues or ideas?',
    opt5: '⚖️ Intellectual Property & Copyrights',
    optMenu: '🔄 View other questions (Menu)',

    res1: 'The first application integrated into the launcher is the **Mobile Forestry Inventory**. It allows you to collect large amounts of data directly in the forest structured by **estate, plot, and stand**, as well as record vegetation details and tree measurements. Once finished, data can be exported into a **CSV file** and analyzed with a specialized analysis software.',
    res2: 'Yes, it is fully designed for field work! The app **works 100% offline (without internet)**. You can collect all inventory data deep in the forest. As soon as your mobile detects an internet connection, all data will **automatically sync** with the server.',
    res3: 'The main difference is your data safety:\n\n• **Guest Mode:** Free access where everything is saved **locally** on your mobile browser. If you lose/damage your phone or clear cache, data will be lost.\n\n• **Registered User:** Registration is **free for everyone**. When logged in, your data is saved to the online database (cloud). This acts as a backup and allows you to open your data from other devices.',
    res4: 'In your Hub menu, you have a floating button with a lightbulb icon (**Suggest Improvement / Issues**). There you can fill out a form classifying the case as a bug, new idea, or design flaw. We will get an immediate alert to look into it!',
    res5: 'This software has been fully developed and created by (**Martí Solé i Xanxo**) with the help of the IA.\n\nThe project is distributed under a **modified MIT license**. This variant maintains the permissiveness of the original MIT (allowing use, copying, modification, and distribution), but introduces an **additional clause regulating commercial use**:\n\nAny commercial exploitation of the software requires the **explicit consent of the author** and may entail **financial compensation**. This measure seeks to protect intellectual property and ensure that commercial use is carried out with a proper agreement and recognition of the authors.'
  }
};

function getLang() { return localStorage.getItem('ptgmf_lang') || 'ca'; }
function setLang(lang) { localStorage.setItem('ptgmf_lang', lang); applyLang(lang); }
function cycleLang() {
  const cur = getLang();
  setLang(LANGS[(LANGS.indexOf(cur) + 1) % LANGS.length]);
  initChat();
}

function applyLang(lang) {
  const t = BOT_DATA[lang] || BOT_DATA.ca;
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) el.textContent = t[key];
  });
  const btn = document.getElementById('lang-btn');
  if (btn) btn.textContent = LANG_LABELS[lang] || lang.toUpperCase();
}

document.addEventListener('DOMContentLoaded', () => {
  applyLang(getLang());
  initChat();
});

function initChat() {
  const chatBox = document.getElementById('chat-box');
  chatBox.innerHTML = '';
  const t = BOT_DATA[getLang()] || BOT_DATA.ca;
  
  sendBotMessage(t.welcome);
  
  setTimeout(() => {
    showMainMenu();
  }, 600);
}

function sendBotMessage(textHTML) {
  const chatBox = document.getElementById('chat-box');
  const t = BOT_DATA[getLang()] || BOT_DATA.ca;
  const tempId = 'typing-' + Date.now();
  
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg bot';
  msgDiv.id = tempId;
  msgDiv.innerHTML = `
    <div class="msg-bubble">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
    <span class="msg-meta">${t.botName} · ${getCurrentTime()}</span>
  `;
  chatBox.appendChild(msgDiv);
  scrollToBottom();

  setTimeout(() => {
    const el = document.getElementById(tempId);
    if (!el) return;
    const bubble = el.querySelector('.msg-bubble');
    let formattedText = textHTML.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    bubble.innerHTML = formattedText;
    scrollToBottom();
  }, 1000);
}

function sendUserMessage(text) {
  const chatBox = document.getElementById('chat-box');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg user';
  msgDiv.innerHTML = `
    <div class="msg-bubble">${text}</div>
    <span class="msg-meta">${getCurrentTime()}</span>
  `;
  chatBox.appendChild(msgDiv);
  scrollToBottom();
}

/* ========================================================================
  📥 PAS 2: SI AFEGEIXES UNA PREGUNTA 6, S'HA D'AFEGIR EL BOTÓ AQUÍ SOTA
  ========================================================================
*/
function showMainMenu() {
  const optionsBox = document.getElementById('options-box');
  const t = BOT_DATA[getLang()] || BOT_DATA.ca;
  
  optionsBox.innerHTML = `
    <button class="opt-btn" onclick="handleSelectOption(1)">${t.opt1}</button>
    <button class="opt-btn" onclick="handleSelectOption(2)">${t.opt2}</button>
    <button class="opt-btn" onclick="handleSelectOption(3)">${t.opt3}</button>
    <button class="opt-btn" onclick="handleSelectOption(4)">${t.opt4}</button>
    <button class="opt-btn" onclick="handleSelectOption(5)">${t.opt5}</button>
  `;
}

function handleSelectOption(num) {
  const t = BOT_DATA[getLang()] || BOT_DATA.ca;
  const optionsBox = document.getElementById('options-box');
  
  optionsBox.innerHTML = '';
  const selectedText = t['opt' + num];
  sendUserMessage(selectedText);

  setTimeout(() => {
    const replyText = t['res' + num];
    sendBotMessage(replyText);
    
    setTimeout(() => {
      optionsBox.innerHTML = `
        <button class="opt-btn" onclick="initChat()">${t.optMenu}</button>
      `;
    }, 1100);
  }, 500);
}

function scrollToBottom() {
  const chatBox = document.getElementById('chat-box');
  chatBox.scrollTop = chatBox.scrollHeight;
}

function getCurrentTime() {
  const now = new Date();
  return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
}
</script>
</body>
</html>
