<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a3d2b">
<meta name="description" content="Hub d'aplicacions forestals PTGMF per Martí Solé i Xanxo">
<title>PTGMF · Hub d'Aplicacions</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PTGMF Hub">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --v-fosc:  #1a3d2b;
  --v-fosc2: #163424;
  --v:       #2d6a4f;
  --v-mig:   #40916c;
  --v-clar:  #74c69d;
  --v-pale:  #d8f3dc;
  --err:     #c0392b;
  --fons:    #f0f4f1;
  --card:    #ffffff;
  --text:    #1c2b22;
  --suau:    #5a7060;
  --borde:   #dce8df;
  --r:       16px;
  --sh:      0 4px 24px rgba(45,106,79,.13);
  --ff-s:    'DM Sans', 'Helvetica Neue', Arial, sans-serif;
  --ff-m:    'DM Mono', 'Courier New', monospace;
  --safe-t:  env(safe-area-inset-top, 0px);
  --safe-b:  env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--ff-s);
  background: var(--fons);
  color: var(--text);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}
input, button { font-family: var(--ff-s); -webkit-appearance: none; appearance: none; }
button { cursor: pointer; border: none; }

/* ── LAYOUT ── */
#hub-root {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ── LOGIN SCREEN ── */
#login-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: calc(var(--safe-t) + 24px) 24px calc(var(--safe-b) + 24px);
  background: linear-gradient(160deg, var(--v-fosc2) 0%, var(--v) 60%, #52b788 100%);
  min-height: 100dvh;
}
.login-logo {
  width: 84px; height: 84px;
  border-radius: 22px;
  margin-bottom: 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
}
.login-title {
  color: #fff;
  font-weight: 700;
  font-size: 24px;
  margin-bottom: 4px;
  text-align: center;
  letter-spacing: -.3px;
}
.login-subtitle {
  color: rgba(255,255,255,.58);
  font-size: 13px;
  margin-bottom: 32px;
  text-align: center;
}
.login-card {
  background: rgba(255,255,255,.09);
  border: 1px solid rgba(255,255,255,.14);
  border-radius: 20px;
  padding: 24px 22px;
  width: 100%;
  max-width: 380px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.login-tabs {
  display: flex;
  background: rgba(0,0,0,.22);
  border-radius: 11px;
  padding: 3px;
  margin-bottom: 22px;
}
.login-tab-btn {
  flex: 1;
  padding: 9px;
  border-radius: 9px;
  background: none;
  border: none;
  color: rgba(255,255,255,.45);
  font-size: 13px;
  font-weight: 600;
  font-family: var(--ff-s);
  cursor: pointer;
  transition: all .2s;
}
.login-tab-btn.active { background: rgba(255,255,255,.16); color: #fff; }
.login-input {
  width: 100%;
  padding: 13px 15px;
  background: rgba(255,255,255,.11);
  border: 1px solid rgba(255,255,255,.16);
  border-radius: 11px;
  color: #fff;
  font-size: 14px;
  font-family: var(--ff-s);
  margin-bottom: 10px;
  outline: none;
  -webkit-appearance: none;
  transition: border-color .2s;
}
.login-input::placeholder { color: rgba(255,255,255,.35); }
.login-input:focus { border-color: var(--v-clar); }
.login-btn-primary {
  width: 100%;
  padding: 14px;
  background: var(--v-mig);
  color: #fff;
  border: none;
  border-radius: 11px;
  font-size: 15px;
  font-weight: 700;
  font-family: var(--ff-s);
  cursor: pointer;
  margin-top: 6px;
  transition: background .2s, opacity .2s;
}
.login-btn-primary:hover { background: var(--v-clar); }
.login-btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.login-btn-ghost {
  width: 100%;
  padding: 13px;
  background: transparent;
  color: var(--v-clar);
  border: 2px solid rgba(116,198,157,.45);
  border-radius: 11px;
  font-size: 14px;
  font-weight: 600;
  font-family: var(--ff-s);
  cursor: pointer;
  margin-top: 12px;
  transition: border-color .2s, color .2s;
}
.login-btn-ghost:hover { border-color: var(--v-clar); color: #fff; }
.login-error {
  color: #ff7675;
  font-size: 12px;
  text-align: center;
  margin-top: 10px;
  min-height: 18px;
}
.login-footer {
  color: rgba(255,255,255,.28);
  font-size: 11px;
  text-align: center;
  margin-top: 22px;
  max-width: 300px;
  line-height: 1.6;
}

/* ── HUB SCREEN ── */
#hub-screen {
  display: none;
  flex: 1;
  flex-direction: column;
  min-height: 100dvh;
}

/* HEADER */
.hub-header {
  background: var(--v-fosc);
  padding: calc(var(--safe-t) + 14px) 18px 14px;
  display: flex;
  align-items: center;
  gap: 13px;
  box-shadow: 0 2px 10px rgba(0,0,0,.25);
  position: sticky;
  top: 0;
  z-index: 50;
}
.hub-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--v-mig);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  flex-shrink: 0;
  border: 2px solid rgba(116,198,157,.35);
}
.hub-header-info { flex: 1; min-width: 0; }
.hub-header-title { color: #fff; font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hub-header-sub   { color: rgba(255,255,255,.45); font-size: 11px; margin-top: 1px; }
.hub-logout-btn {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.13);
  color: rgba(255,255,255,.6);
  border-radius: 8px;
  font-size: 12px;
  font-family: var(--ff-s);
  padding: 7px 11px;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .2s;
}
.hub-logout-btn:hover { background: rgba(255,255,255,.14); color: #fff; }

/* HUB BODY */
.hub-body {
  flex: 1;
  padding: 24px 16px calc(var(--safe-b) + 32px);
}
.hub-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.4px;
  color: var(--v);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.hub-section-title::before {
  content: '';
  display: inline-block;
  width: 3px;
  height: 13px;
  background: var(--v-mig);
  border-radius: 2px;
}

/* APP GRID */
.app-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 13px;
  margin-bottom: 28px;
}
.app-card {
  background: var(--card);
  border: 1px solid var(--borde);
  border-radius: 16px;
  padding: 18px 16px 16px;
  box-shadow: var(--sh);
  cursor: pointer;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: transform .15s, box-shadow .15s, border-color .15s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  overflow: hidden;
}
.app-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--v-mig), var(--v-clar));
  border-radius: 16px 16px 0 0;
}
.app-card:active { transform: scale(.96); box-shadow: 0 2px 8px rgba(45,106,79,.1); }
.app-card-icon {
  width: 46px; height: 46px;
  border-radius: 12px;
  background: var(--v-pale);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.app-card-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}
.app-card-desc {
  font-size: 11px;
  color: var(--suau);
  line-height: 1.4;
}
.app-card-badge {
  position: absolute;
  top: 12px; right: 12px;
  background: var(--v-pale);
  color: var(--v);
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
  letter-spacing: .4px;
  text-transform: uppercase;
}

/* COMING SOON */
.app-card.coming-soon {
  opacity: .55;
  cursor: default;
}
.app-card.coming-soon::before { background: #dce8df; }
.app-card.coming-soon .app-card-badge { background: #f0f4f1; color: var(--suau); }

/* SYNC STATUS BAR */
.hub-sync-bar {
  background: var(--card);
  border: 1px solid var(--borde);
  border-radius: 12px;
  padding: 11px 15px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.sync-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  background: #aaa;
  transition: background .3s;
}
.sync-dot.ok      { background: #27ae60; }
.sync-dot.pending { background: #f39c12; }
.sync-dot.error   { background: #e74c3c; }
.sync-dot.syncing { background: var(--v-mig); animation: pulse-dot 1s infinite; }
@keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
.sync-bar-text { font-size: 12px; color: var(--suau); flex: 1; }

/* CREDITS */
.hub-credits {
  text-align: center;
  padding-top: 20px;
  border-top: 1px solid var(--borde);
}
.hub-credits p { font-weight: 700; color: var(--v-mig); font-size: 12px; }

/* TOAST */
.toast {
  position: fixed;
  bottom: calc(var(--safe-b) + 18px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--v-fosc);
  color: var(--v-pale);
  padding: 11px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  max-width: calc(100vw - 32px);
  text-align: center;
  opacity: 0;
  transition: opacity .3s, transform .3s;
  z-index: 9999;
  pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,.28);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="hub-root">

  <!-- ═══ PANTALLA LOGIN ═══ -->
  <div id="login-screen">
    <img src="icon-512.png" class="login-logo" alt="PTGMF" onerror="this.style.display='none'">
    <div class="login-title">PTGMF · Hub Forestal</div>
    <div class="login-subtitle">Accedeix o continua sense compte</div>

    <div class="login-card">
      <div class="login-tabs">
        <button class="login-tab-btn active" id="ltab-login"    onclick="switchLoginTab('login')">Iniciar sessió</button>
        <button class="login-tab-btn"        id="ltab-register" onclick="switchLoginTab('register')">Registrar-se</button>
      </div>

      <!-- Login -->
      <div id="login-form">
        <input class="login-input" type="email"    id="login-email"    placeholder="Correu electrònic" autocomplete="email">
        <input class="login-input" type="password" id="login-password" placeholder="Contrasenya"       autocomplete="current-password">
        <button class="login-btn-primary" id="login-submit-btn" onclick="doLogin()">Entrar</button>
      </div>

      <!-- Register -->
      <div id="register-form" style="display:none;">
        <input class="login-input" type="email"    id="reg-email"     placeholder="Correu electrònic"              autocomplete="email">
        <input class="login-input" type="password" id="reg-password"  placeholder="Contrasenya (mínim 6 caràcters)" autocomplete="new-password">
        <input class="login-input" type="password" id="reg-password2" placeholder="Repetir contrasenya"             autocomplete="new-password">
        <button class="login-btn-primary" id="register-submit-btn" onclick="doRegister()">Crear compte</button>
      </div>

      <div class="login-error" id="login-error"></div>
      <button class="login-btn-ghost" onclick="continuarConvidat()">Continuar sense registrar-se →</button>
    </div>

    <div class="login-footer">
      Les teves dades s'emmagatzemen de forma segura al núvol.<br>
      Cada usuari només pot veure les seves pròpies dades.
    </div>
  </div>

  <!-- ═══ PANTALLA HUB ═══ -->
  <div id="hub-screen">
    <!-- Header -->
    <header class="hub-header">
      <div class="hub-avatar" id="hub-avatar">?</div>
      <div class="hub-header-info">
        <div class="hub-header-title" id="hub-user-name">Carregant...</div>
        <div class="hub-header-sub"   id="hub-user-sub">PTGMF · Hub d'Aplicacions</div>
      </div>
      <button class="hub-logout-btn" onclick="doLogout()">Sortir</button>
    </header>

    <!-- Body -->
    <div class="hub-body">

      <!-- Sync -->
      <div class="hub-sync-bar">
        <div class="sync-dot" id="hub-sync-dot"></div>
        <div class="sync-bar-text" id="hub-sync-text">Comprovant connexió...</div>
      </div>

      <div class="hub-section-title">Aplicacions disponibles</div>
      <div class="app-grid" id="app-grid">
        <!-- generat dinàmicament per JS -->
      </div>

      <div class="hub-credits"><p>🌳 Dissenyat per Martí Solé i Xanxo (M.S.X.) 🌳</p></div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   SUPABASE CONFIG (claus reals de l'app)
   ============================================================ */
const SUPABASE_URL      = 'https://hkkxgzdopvimgarmxdnj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_dG2BbEcuF_W7fefkSPHK6Q_ka6iQAyM';

let sbClient  = null;
let sbUser    = null;

/* ============================================================
   CATÀLEG D'APLICACIONS
   Per afegir una nova app: afegeix un objecte a aquest array
   i posa el fitxer HTML al servidor. Sense tocar res més.
   ============================================================ */
const APPS = [
  {
    name: 'Inventari Forestal',
    desc: 'Parcel·les, dasometria i vegetació',
    icon: '🌲',
    url:  'Inventari.html',
    badge: 'v10',
    active: true,
  },
  // Exemple d'app futura (comment out per deshabilitar):
  // {
  //   name: 'Mapa Forestal',
  //   desc: 'Visualització cartogràfica de rodals',
  //   icon: '🗺️',
  //   url:  'mapa.html',
  //   badge: 'Aviat',
  //   active: false,
  // },
];

/* ============================================================
   INIT
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
  buildAppGrid();
  initSupabase();
});

function buildAppGrid() {
  const grid = document.getElementById('app-grid');
  grid.innerHTML = APPS.map(app => {
    if (app.active) {
      return `
        <a class="app-card" href="${app.url}" onclick="navigateToApp(event,'${app.url}')">
          <div class="app-card-icon">${app.icon}</div>
          <div>
            <div class="app-card-name">${app.name}</div>
            <div class="app-card-desc">${app.desc}</div>
          </div>
          ${app.badge ? `<span class="app-card-badge">${app.badge}</span>` : ''}
        </a>`;
    } else {
      return `
        <div class="app-card coming-soon">
          <div class="app-card-icon">${app.icon}</div>
          <div>
            <div class="app-card-name">${app.name}</div>
            <div class="app-card-desc">${app.desc}</div>
          </div>
          ${app.badge ? `<span class="app-card-badge">${app.badge}</span>` : ''}
        </div>`;
    }
  }).join('');
}

function navigateToApp(e, url) {
  // Guardar mode actual al localStorage perquè l'app el pugui llegir
  setAppMode(sbUser ? 'logged_in' : 'guest');
  // La navegació normal continua (no cancel·lem l'event)
}

/* ============================================================
   APP MODE (estat global compartit entre pàgines)
   ============================================================ */
function setAppMode(mode) {
  const payload = {
    mode,   // 'logged_in' | 'guest'
    userId: sbUser ? sbUser.id    : null,
    email:  sbUser ? sbUser.email : null,
    ts:     Date.now(),
  };
  localStorage.setItem('ptgmf_app_mode', JSON.stringify(payload));
}

/* ============================================================
   SUPABASE INIT
   ============================================================ */
function initSupabase() {
  try {
    if (typeof window.supabase !== 'undefined') {
      sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
  } catch(e) { console.error('Supabase init error:', e); }

  if (!sbClient) {
    sbClient = makeFallbackClient();
  }

  // Escolta canvis d'auth
  try {
    sbClient.auth.onAuthStateChange(async (event, session) => {
      sbUser = session ? session.user : null;
      setAppMode(sbUser ? 'logged_in' : 'guest');
      handleAuthState();
    });

    sbClient.auth.getSession().then(({ data: { session } }) => {
      sbUser = session ? session.user : null;
      setAppMode(sbUser ? 'logged_in' : 'guest');
      handleAuthState();
    });
  } catch(e) {
    // Si Supabase falla del tot, comprova si hi havia sessió guardada
    const saved = localStorage.getItem('ptgmf_app_mode');
    if (saved) {
      try {
        const m = JSON.parse(saved);
        if (m.mode === 'guest') { showHub(false); return; }
      } catch(_) {}
    }
    showLogin();
  }
}

function handleAuthState() {
  if (sbUser) {
    showHub(true);
    setSyncStatus('ok', `Sessió activa · ${sbUser.email}`);
  } else {
    const saved = localStorage.getItem('ptgmf_app_mode');
    let mode = null;
    try { mode = JSON.parse(saved).mode; } catch(_) {}
    if (mode === 'guest') {
      showHub(false);
      setSyncStatus('pending', 'Mode Convidat · Sense còpia al núvol');
    } else {
      showLogin();
    }
  }
}

/* ============================================================
   AUTH ACTIONS
   ============================================================ */
function switchLoginTab(tab) {
  document.getElementById('ltab-login').classList.toggle('active', tab === 'login');
  document.getElementById('ltab-register').classList.toggle('active', tab === 'register');
  document.getElementById('login-form').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('login-error').textContent = '';
}

function setLoginError(msg) {
  document.getElementById('login-error').textContent = msg;
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  if (!email || !pass) { setLoginError('Introdueix correu i contrasenya.'); return; }
  const btn = document.getElementById('login-submit-btn');
  btn.disabled = true; btn.textContent = 'Entrant...';
  setLoginError('');
  const { error } = await sbClient.auth.signInWithPassword({ email, password: pass });
  btn.disabled = false; btn.textContent = 'Entrar';
  if (error) setLoginError(translateAuthError(error.message));
}

async function doRegister() {
  const email = document.getElementById('reg-email').value.trim();
  const pass  = document.getElementById('reg-password').value;
  const pass2 = document.getElementById('reg-password2').value;
  if (!email || !pass) { setLoginError('Introdueix correu i contrasenya.'); return; }
  if (pass !== pass2)  { setLoginError('Les contrasenyes no coincideixen.'); return; }
  if (pass.length < 6) { setLoginError('La contrasenya ha de tenir mínim 6 caràcters.'); return; }
  const btn = document.getElementById('register-submit-btn');
  btn.disabled = true; btn.textContent = 'Creant compte...';
  setLoginError('');
  const { error } = await sbClient.auth.signUp({ email, password: pass });
  btn.disabled = false; btn.textContent = 'Crear compte';
  if (error) { setLoginError(translateAuthError(error.message)); return; }
  setLoginError('✅ Compte creat! Ara pots iniciar sessió.');
}

function continuarConvidat() {
  localStorage.setItem('ptgmf_app_mode', JSON.stringify({ mode: 'guest', userId: null, email: null, ts: Date.now() }));
  showHub(false);
  setSyncStatus('pending', 'Mode Convidat · Dades guardades localment');
}

async function doLogout() {
  if (!confirm('Tancar la sessió?')) return;
  localStorage.removeItem('ptgmf_app_mode');
  await sbClient.auth.signOut();
  sbUser = null;
  showLogin();
  showToast('Sessió tancada correctament.');
}

function translateAuthError(msg) {
  if (msg.includes('Invalid login'))           return 'Correu o contrasenya incorrectes.';
  if (msg.includes('Email not confirmed'))     return 'Cal confirmar el correu electrònic.';
  if (msg.includes('User already registered')) return 'Aquest correu ja té un compte.';
  if (msg.includes('Password should be at least')) return 'La contrasenya ha de tenir mínim 6 caràcters.';
  return msg;
}

/* ============================================================
   UI HELPERS
   ============================================================ */
function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('hub-screen').style.display   = 'none';
}

function showHub(loggedIn) {
  document.getElementById('login-screen').style.display = 'none';
  const hubScreen = document.getElementById('hub-screen');
  hubScreen.style.display = 'flex';

  const avatar = document.getElementById('hub-avatar');
  const name   = document.getElementById('hub-user-name');
  const sub    = document.getElementById('hub-user-sub');

  if (loggedIn && sbUser) {
    const email  = sbUser.email || '';
    const letter = email.charAt(0).toUpperCase();
    avatar.textContent = letter;
    name.textContent   = email;
    sub.textContent    = 'Compte registrat · PTGMF Hub';
  } else {
    avatar.textContent = '👤';
    name.textContent   = 'Mode Convidat';
    sub.textContent    = 'Dades guardades localment';
  }
}

function setSyncStatus(state, text) {
  const dot = document.getElementById('hub-sync-dot');
  const txt = document.getElementById('hub-sync-text');
  if (dot) dot.className = 'sync-dot ' + state;
  if (txt) txt.textContent = text;
}

/* ============================================================
   TOAST
   ============================================================ */
let toastTimer = null;
function showToast(msg, ms = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), ms);
}

/* ============================================================
   FALLBACK CLIENT (sense xarxa)
   ============================================================ */
function makeFallbackClient() {
  return {
    auth: {
      onAuthStateChange: () => ({ data: { subscription: { unsubscribe: () => {} } } }),
      signUp:            async () => ({ data: { user: null }, error: { message: 'Sense connexió.' } }),
      signInWithPassword:async () => ({ data: { user: null }, error: { message: 'Sense connexió.' } }),
      signOut:           async () => ({ error: null }),
      getSession:        async () => ({ data: { session: null } }),
    }
  };
}

/* ============================================================
   SERVICE WORKER
   ============================================================ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .catch(e => console.log('SW no disponible:', e));
  });
}
